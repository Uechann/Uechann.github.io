baseURL: "https://uechann.github.io/"
locale: "ko-kr"
title: "의찬의 개발 블로그"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
hasCJKLanguage: true

paginate: 10

taxonomies:
  category: categories
  tag: tags
  series: series

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    tabWidth: 4
  tableOfContents:
    startLevel: 2
    endLevel: 4

outputs:
  home:
    - HTML
    - RSS

params:
  mainSections:
    - posts
  rssFullContent: true

  # 검색 엔진 소유권 인증 코드 (각 콘솔의 'HTML 태그' 방식 content 값)
  verification:
    google: "GHkeQaBdLyAbuIjDf08-m0lk2nK73Lc3wE0a_obm-m4"   # Google Search Console
    naver: "fed111bc4600c5a5c0703955216f8789bb5a6226"    # Naver Search Advisor

  # 글에 image가 없을 때 사용할 기본 OG 이미지 (static/ 기준 경로, 선택)
  defaultImage: ""   # 예: "/img/og-default.png"

  dateFormat:
    published: "2006년 01월 02일"

  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: "Uechann/Uechann.github.io"
      repoID: "R_kgDOS6ULvw"
      category: "General"
      categoryID: "DIC_kwDOS6ULv84C_Lb8"
      mapping: pathname
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: bottom
      lang: ko
      lightTheme: light
      darkTheme: dark_dimmed

caches:
  images:
    dir: :cacheDir/images
