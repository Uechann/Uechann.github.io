baseURL: "https://uechann.github.io/"
locale: "ko-kr"
title: "의찬의 개발 블로그"
theme: "hugo-book"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
disablePathToLower: true

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1
    endLevel: 3
  highlight:
    style: base16-snazzy

params:
  BookTheme: auto
  BookSearch: true
  BookSection: posts
  BookToC: true
  BookComments: false
  BookDateFormat: "2006년 01월 02일"
  BookRepo: "https://github.com/Uechann/Uechann.github.io"

caches:
  images:
    dir: :cacheDir/images
