baseURL: "https://uechann.github.io/"
locale: "ko-kr"
title: "의찬의 개발 블로그"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
hasCJKLanguage: true

paginate: 10

taxonomies:
  category: categories
  tag: tags
  series: series

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    tabWidth: 4
  tableOfContents:
    startLevel: 2
    endLevel: 4

outputs:
  home:
    - HTML
    - RSS

params:
  mainSections:
    - posts
  rssFullContent: true

  dateFormat:
    published: "2006년 01월 02일"

  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: "Uechann/Uechann.github.io"
      repoID: "R_kgDOS6ULvw"
      category: "General"
      categoryID: "DIC_kwDOS6ULv84C_Lb8"
      mapping: pathname
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: bottom
      lang: ko
      lightTheme: light
      darkTheme: dark_dimmed

caches:
  images:
    dir: :cacheDir/images
