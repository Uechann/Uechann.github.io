baseURL: "https://uechann.github.io/"
locale: "ko-kr"
title: "의찬의 개발 블로그"
theme: "PaperMod"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
pagination:
  pagerSize: 10
minify:
  disableXML: true
params:
  env: production
  description: "백엔드 개발 학습 기록과 트러블슈팅"
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  homeInfoParams:
    Title: "안녕하세요 👋"
    Content: "백엔드 개발을 공부하며 마주친 문제와 해결 과정을 기록합니다."
  socialIcons:
    - name: github
      url: "https://github.com/Uechann"
menu:
  main:
    - identifier: posts
      name: 글
      url: /posts/
      weight: 10
    - identifier: tags
      name: 태그
      url: /tags/
      weight: 20
# GitHub Actions 빌드 캐시용 (공식 권장)
caches:
  images:
    dir: :cacheDir/images
