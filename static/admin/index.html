<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — 의찬의 블로그</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css" />
  <style>
    :root {
      --bg:       #f3f4f6;
      --surface:  #ffffff;
      --surface2: #f8fafc;
      --border:   #e5e7eb;
      --text:     #111827;
      --muted:    #6b7280;
      --accent:   #3b82f6;
      --accent-d: #2563eb;
      --accent-l: rgba(59,130,246,.10);
      --danger:   #ef4444;
      --success:  #10b981;
      --warn:     #f59e0b;
      --radius:   12px;
      --radius-s: 8px;
      --shadow:   0 1px 3px rgba(0,0,0,.08);
      --shadow-m: 0 4px 14px rgba(0,0,0,.10);
      --sidebar:  260px;
      --font: 'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg:#0f172a; --surface:#1e293b; --surface2:#1a2234;
        --border:#334155; --text:#f1f5f9; --muted:#94a3b8;
        --accent-l:rgba(96,165,250,.12);
        --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-m:0 4px 14px rgba(0,0,0,.35);
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
    a{color:var(--accent);text-decoration:none}
    button{cursor:pointer;font-family:inherit;font-size:inherit}
    input,textarea,select{font-family:inherit;font-size:inherit}
    #app{height:100%}

    /* ── Buttons ─────────────────────────────────────── */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-s);font-size:13.5px;font-weight:500;border:none;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-d)}
    .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{background:var(--bg)}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-danger:hover{filter:brightness(.9)}
    .btn-ghost{background:transparent;color:var(--muted)}
    .btn-ghost:hover{color:var(--text);background:var(--accent-l)}
    .btn-sm{padding:5px 10px;font-size:12.5px}

    /* ── Layout ──────────────────────────────────────── */
    .layout{display:flex;height:100vh;overflow:hidden}

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .sidebar-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sidebar-logo .blog-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
    .sidebar-logo .sub{font-size:11px;color:var(--muted);margin-top:2px;padding-left:22px}

    /* ── Tree ────────────────────────────────────────── */
    .sidebar-tree{flex:1;overflow-y:auto;padding:6px 0}

    .tree-group{}
    .tree-group-hd{display:flex;align-items:center;gap:5px;padding:5px 12px;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none;transition:color .12s}
    .tree-group-hd:hover{color:var(--text)}
    .tree-group:not(.open)>.tree-group-body{display:none}
    .tree-group.open>.tree-group-hd .arrow{transform:rotate(90deg)}

    .tree-cat-hd{display:flex;align-items:center;gap:5px;padding:5px 10px 5px 22px;font-size:13px;cursor:pointer;user-select:none;border-radius:6px;color:var(--text);transition:background .1s;margin:1px 5px}
    .tree-cat-hd:hover{background:var(--accent-l)}
    .tree-cat-hd .cat-label{flex:1;min-width:0}
    .tree-cat:not(.open)>.tree-cat-body{display:none}
    .tree-cat.open>.tree-cat-hd .arrow{transform:rotate(90deg)}

    .arrow{font-size:8px;color:var(--muted);transition:transform .15s;display:inline-block;flex-shrink:0}
    .cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .cat-cnt{margin-left:auto;font-size:10.5px;color:var(--muted);background:var(--bg);padding:1px 5px;border-radius:10px;min-width:18px;text-align:center}

    .tree-post{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 40px;font-size:12.5px;cursor:pointer;border-radius:5px;margin:1px 5px;color:var(--text);transition:background .1s}
    .tree-post:hover{background:var(--accent-l)}
    .tree-post.active{background:var(--accent-l);color:var(--accent);font-weight:600}
    .tree-post.draft{color:var(--muted)}
    .post-icon-t{font-size:11px;flex-shrink:0}
    .post-title-t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .tree-new-btn{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 40px;font-size:12px;cursor:pointer;border-radius:5px;margin:1px 5px 4px;color:var(--muted);transition:all .1s}
    .tree-new-btn:hover{background:var(--accent-l);color:var(--accent)}
    .tree-plus{font-size:14px;font-weight:400;line-height:1}

    .tree-loading,.tree-empty{padding:5px 10px 5px 40px;font-size:12px;color:var(--muted)}
    .tree-empty{font-style:italic}

    /* ── Sidebar footer ──────────────────────────────── */
    .sidebar-footer{padding:8px 5px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px;flex-shrink:0}
    .footer-btn{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;width:100%;text-align:left;transition:all .12s;text-decoration:none}
    .footer-btn:hover{background:var(--accent-l);color:var(--accent)}

    /* ── Main ────────────────────────────────────────── */
    .main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
    .main-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .main-topbar-title{font-size:14px;font-weight:500;flex:1;color:var(--muted)}
    .main-topbar-title strong{color:var(--text)}
    .main-actions{display:flex;gap:6px}
    .main-content{flex:1;overflow-y:auto;padding:28px}
    .content-inner{max-width:900px}

    /* ── Login ───────────────────────────────────────── */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow-m)}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-logo .icon{font-size:40px}
    .login-logo h1{font-size:21px;font-weight:700;margin-top:10px}
    .login-logo p{font-size:13px;color:var(--muted);margin-top:4px}

    /* ── Form ────────────────────────────────────────── */
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
    .form-input{width:100%;padding:8px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-s);color:var(--text);outline:none;transition:border-color .15s}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l)}
    .form-input::placeholder{color:var(--muted)}
    textarea.form-input{resize:vertical;min-height:80px;line-height:1.5}

    .toggle-wrap{display:flex;align-items:center;gap:10px}
    .toggle{position:relative;width:40px;height:22px;display:inline-block}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .toggle-track{position:absolute;inset:0;border-radius:22px;background:var(--border);transition:.2s;cursor:pointer}
    .toggle-track::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;left:3px;top:3px;background:#fff;transition:.2s}
    .toggle input:checked~.toggle-track{background:var(--accent)}
    .toggle input:checked~.toggle-track::before{transform:translateX(18px)}

    .tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-s);min-height:40px;cursor:text}
    .tags-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l)}
    .tag-chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-l);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:12px;font-weight:500}
    .tag-remove{background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;line-height:1;padding:0}
    .tag-input{border:none;background:transparent;outline:none;font-family:inherit;font-size:13px;color:var(--text);min-width:80px;flex:1}

    .cat-pills{display:flex;flex-wrap:wrap;gap:6px}
    .cat-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12.5px;border:1.5px solid var(--border);cursor:pointer;transition:all .12s;user-select:none}
    .cat-pill input{position:absolute;opacity:0;width:0;height:0}
    .cat-pill.on{border-color:var(--accent);background:var(--accent-l);color:var(--accent);font-weight:600}

    .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
    .badge-draft{background:rgba(245,158,11,.13);color:var(--warn)}
    .badge-pub{background:rgba(16,185,129,.13);color:var(--success)}

    /* ── Editor ──────────────────────────────────────── */
    .ed-title{width:100%;font-size:26px;font-weight:700;border:none;background:transparent;color:var(--text);outline:none;padding:0 0 12px;margin-bottom:20px;border-bottom:2px solid var(--border)}
    .ed-title:focus{border-bottom-color:var(--accent)}
    .ed-title::placeholder{color:var(--muted);font-weight:400}
    .ed-meta{display:grid;grid-template-columns:160px auto;gap:16px;margin-bottom:16px;align-items:start}
    .ed-footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px;margin-top:16px;border-top:1px solid var(--border)}

    .EasyMDEContainer .CodeMirror{border-radius:0 0 var(--radius-s) var(--radius-s);font-size:13.5px;background:var(--bg);color:var(--text);border-color:var(--border)}
    .editor-toolbar{border-color:var(--border)!important;background:var(--surface)!important}
    .editor-toolbar button{color:var(--muted)!important}
    .editor-toolbar button:hover,.editor-toolbar button.active{background:var(--accent-l)!important;border-color:var(--accent)!important;color:var(--accent)!important}
    .editor-toolbar i.separator{border-color:var(--border)!important}

    /* ── Welcome ─────────────────────────────────────── */
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;color:var(--muted);gap:12px}
    .welcome-icon{font-size:48px}
    .welcome h2{font-size:20px;font-weight:700;color:var(--text)}
    .welcome p{font-size:14px;line-height:1.7;max-width:360px}
    .welcome-hint{font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);padding:10px 16px;display:flex;align-items:center;gap:8px}

    /* ── Toast ───────────────────────────────────────── */
    #toasts{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{padding:11px 18px;border-radius:var(--radius-s);font-size:14px;font-weight:500;box-shadow:var(--shadow-m);animation:tIn .2s ease;max-width:340px;pointer-events:auto}
    .toast-success{background:var(--success);color:#fff}
    .toast-error{background:var(--danger);color:#fff}
    .toast-info{background:var(--accent);color:#fff}
    @keyframes tIn{from{opacity:0;transform:translateY(8px)}}

    .divider{height:1px;background:var(--border);margin:20px 0}
    .spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:48px auto}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Category Management ─────────────────────────── */
    .mgmt-table{width:100%;border-collapse:collapse;font-size:13.5px}
    .mgmt-table th{background:var(--surface2);color:var(--muted);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
    .mgmt-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
    .mgmt-table tr:last-child td{border-bottom:none}
    .mgmt-table tr:hover td{background:var(--bg)}
    .badge{display:inline-block;background:var(--bg);color:var(--muted);border:1px solid var(--border);padding:1px 8px;border-radius:10px;font-size:12px;font-weight:600}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .form-grid label{display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:500;color:var(--muted)}
    .form-grid .form-input{margin-top:0}
  </style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
<script>
/* ══ Config ════════════════════════════════════════════ */
const REPO   = 'Uechann/Uechann.github.io';
const BRANCH = 'main';
const GH_API = 'https://api.github.com';

// 카테고리는 런타임에 data/categories.json에서 로드 (flattenTree로 leaf 추출)
let CATS = [];
let CAT  = {};

function flattenTree(nodes, result = []) {
  for (const n of nodes) {
    if (n.children && n.children.length > 0) {
      flattenTree(n.children, result);
    } else {
      result.push({ key: n.key, label: n.label, icon: n.icon || '📁', color: n.color || '#6366f1',
                    contentPath: n.contentPath || `posts/${n.key}` });
    }
  }
  return result;
}

/* ══ State ════════════════════════════════════════════ */
const S = {
  pat:          sessionStorage.getItem('admin_pat') || '',
  view:         'welcome',
  edit:         null,
  mde:          null,
  counts:       {},
  catOpen:      {},
  catPosts:     {},
  catConfigSha: null,
  catTree:      [],          // Composite 트리 (data/categories.json)
  profile:      null,        // data/profile.json 내용
  profileSha:   null,
  showAddCat:   false,
  addCatParent: null,        // 부모 node key (null = 최상위)
};

/* ══ GitHub API ═══════════════════════════════════════ */
async function gh(method, path, body) {
  const r = await fetch(`${GH_API}${path}`, {
    method,
    headers: { Authorization:`token ${S.pat}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 204) return null;
  const json = await r.json();
  if (!r.ok) throw new Error(json.message || `GitHub ${r.status}`);
  return json;
}
const ghGet = p      => gh('GET',    p);
const ghPut = (p, b) => gh('PUT',    p, b);
const ghDel = (p, b) => gh('DELETE', p, b);

function enc(s) { return btoa(unescape(encodeURIComponent(s))); }
function dec(s) { return decodeURIComponent(escape(atob(s.replace(/\n/g, '')))); }

async function getFile(path) {
  const d = await ghGet(`/repos/${REPO}/contents/${path}`);
  return { content: dec(d.content), sha: d.sha };
}
async function saveFile(path, content, sha, msg, rawBase64 = false) {
  const b = { message:msg, content: rawBase64 ? content : enc(content), branch:BRANCH };
  if (sha) b.sha = sha;
  return ghPut(`/repos/${REPO}/contents/${path}`, b);
}
async function delFile(path, sha, msg) {
  return ghDel(`/repos/${REPO}/contents/${path}`, { message:msg, sha, branch:BRANCH });
}
async function lsDir(path) {
  try {
    const d = await ghGet(`/repos/${REPO}/contents/${path}`);
    return Array.isArray(d) ? d : [];
  } catch(e) {
    if (/404|Not Found/.test(e.message)) return [];
    throw e;
  }
}

/* ══ Category Config (Composite Tree) ════════════════ */
async function loadCatsConfig() {
  try {
    const { content, sha } = await getFile('data/categories.json');
    const config = JSON.parse(content);
    S.catTree      = config.tree || [];
    S.catConfigSha = sha;
    // Flatten tree to get leaf categories → CATS / CAT
    const leaves = flattenTree(S.catTree);
    CATS.splice(0, CATS.length, ...leaves);
    Object.keys(CAT).forEach(k => delete CAT[k]);
    CATS.forEach(c => {
      CAT[c.key] = c;
      if (S.catOpen[c.key]  === undefined) S.catOpen[c.key]  = false;
      if (S.catPosts[c.key] === undefined) S.catPosts[c.key] = null;
    });
    const treeEl = document.getElementById('sidebar-tree');
    if (treeEl) treeEl.innerHTML = renderTree();
  } catch(err) { /* ignore — tree stays empty */ }
}

async function saveCatsConfig() {
  const res = await saveFile(
    'data/categories.json',
    JSON.stringify({ tree: S.catTree }, null, 2) + '\n',
    S.catConfigSha,
    'config: 카테고리 트리 업데이트',
  );
  S.catConfigSha = res?.content?.sha ?? null;
}

/* ── Find node & parent in tree ───────────────────── */
function findNode(tree, key, parent = null) {
  for (const n of tree) {
    if (n.key === key) return { node: n, parent, siblings: tree };
    if (n.children?.length) {
      const r = findNode(n.children, key, n);
      if (r) return r;
    }
  }
  return null;
}

/* ── Category Manage View (Composite) ────────────── */
function renderCatManageNode(node, depth = 0) {
  const indent = depth * 20;
  if (node.children && node.children.length > 0) {
    // Group node
    const children = node.children.map(c => renderCatManageNode(c, depth + 1)).join('');
    return `
    <div class="mgmt-node" style="padding-left:${indent + 12}px;display:flex;align-items:center;gap:8px;padding-top:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">
      <span style="font-size:1.15em;flex-shrink:0">${node.icon || '📁'}</span>
      <strong style="flex:1">${esc(node.label)}</strong>
      <small style="color:var(--muted)">${esc(node.key)}</small>
      <button class="btn btn-sm btn-ghost" data-act="rename-node" data-node-key="${node.key}" data-node-label="${esc(node.label)}">이름변경</button>
      <button class="btn btn-sm btn-primary" data-act="show-add-cat" data-parent-key="${node.key}">+ 하위 추가</button>
      <button class="btn btn-sm btn-danger" data-act="del-node" data-node-key="${node.key}">삭제</button>
    </div>
    ${children}`;
  } else {
    // Leaf: real category
    const cnt = S.counts[node.key] ?? '?';
    const hasPosts = (S.counts[node.key] ?? 1) > 0;
    return `
    <div class="mgmt-node" style="padding-left:${indent + 24}px;display:flex;align-items:center;gap:8px;padding-top:7px;padding-bottom:7px;border-bottom:1px solid var(--border)">
      <span style="font-size:1em;color:${node.color || '#6366f1'}">${node.icon || '📁'}</span>
      <span style="flex:1">${esc(node.label)}</span>
      <small style="color:var(--muted)">${esc(node.key)}</small>
      <span class="badge">${cnt}</span>
      <button class="btn btn-sm btn-ghost" data-act="rename-node" data-node-key="${node.key}" data-node-label="${esc(node.label)}">이름변경</button>
      ${hasPosts
        ? `<button class="btn btn-sm btn-ghost" disabled title="글이 있어 삭제 불가">삭제</button>`
        : `<button class="btn btn-sm btn-danger" data-act="del-cat" data-cat="${node.key}">삭제</button>`}
    </div>`;
  }
}

function tCatsManage() {
  const treeHtml = S.catTree.map(n => renderCatManageNode(n)).join('');

  const parentKey = S.addCatParent;
  const addForm = S.showAddCat ? `
  <div class="card" style="margin-top:20px;padding:20px">
    <h3 style="margin:0 0 4px">${parentKey ? '하위 폴더/카테고리 추가' : '최상위 폴더 추가'}</h3>
    ${parentKey ? `<p style="margin:0 0 14px;font-size:12.5px;color:var(--muted)">상위: ${esc(findNode(S.catTree, parentKey)?.node?.label || parentKey)}</p>` : '<div style="height:14px"></div>'}
    <div class="form-grid">
      <label>키 (영문·하이픈, 불변)
        <input id="nc-key"   type="text" placeholder="my-category" class="form-input" />
      </label>
      <label>이름
        <input id="nc-label" type="text" placeholder="내 카테고리" class="form-input" />
      </label>
      <label>아이콘 (이모지)
        <input id="nc-icon"  type="text" placeholder="📁" class="form-input" maxlength="4" />
      </label>
      <label>색상 (leaf만)
        <input id="nc-color" type="color" value="#6366f1" class="form-input" style="height:38px;padding:2px 4px" />
      </label>
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px">
      <input type="checkbox" id="nc-is-group" />
      하위 폴더를 포함하는 그룹 노드로 생성
    </label>

async function addCat() {
  const key     = ($('#nc-key')?.value  || '').trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
  const label   = ($('#nc-label')?.value|| '').trim();
  const icon    = ($('#nc-icon')?.value || '').trim() || '📁';
  const color   = $('#nc-color')?.value || '#6366f1';
  const isGroup = !!$('#nc-is-group')?.checked;

  if (!key)   { toast('키를 입력해주세요','error'); return; }
  if (!label) { toast('이름을 입력해주세요','error'); return; }
  if (findNode(S.catTree, key)) { toast('이미 존재하는 키입니다','error'); return; }

  const newNode = { key, label, icon, color: isGroup ? undefined : color, children: [] };
  if (!isGroup) newNode.contentPath = `posts/${key}`;

  try {
    // 글을 담는 leaf면 _index.md 생성
    if (!isGroup) {
      const indexMd = `---\ntitle: ${label}\n---\n`;
      await saveFile(`content/posts/${key}/_index.md`, indexMd, null, `config: 카테고리 ${label} 추가`);
    }

    // 트리에 삽입
    const parentKey = S.addCatParent;
    if (parentKey) {
      const found = findNode(S.catTree, parentKey);
      if (found) found.node.children.push(newNode);
    } else {
      S.catTree.push(newNode);
    }

    await saveCatsConfig();

    // CATS/CAT 재계산
    const leaves = flattenTree(S.catTree);
    CATS.splice(0, CATS.length, ...leaves);
    Object.keys(CAT).forEach(k => delete CAT[k]);
    CATS.forEach(c => {
      CAT[c.key] = c;
      if (S.catOpen[c.key]  === undefined) S.catOpen[c.key]  = false;
      if (S.catPosts[c.key] === undefined) S.catPosts[c.key] = null;
      if (S.counts[c.key]   === undefined) S.counts[c.key]   = 0;
    });

    S.showAddCat = false;
    S.addCatParent = null;
    const treeEl = document.getElementById('sidebar-tree');
    if (treeEl) treeEl.innerHTML = renderTree();
    updateMainContent();
    toast(`"${label}" 추가 완료`, 'success');
  } catch(err) { toast('추가 실패: '+err.message, 'error'); }
}

async function delCat(catKey) {
  const found = findNode(S.catTree, catKey);
  if (!found) return;
  const { node, siblings } = found;
  const cnt = S.counts[catKey] ?? 1;
  if (cnt > 0) { toast('글이 있는 카테고리는 삭제할 수 없습니다','error'); return; }
  if (!confirm(`"${node.label}" 카테고리를 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;

  try {
    const path = `content/posts/${catKey}/_index.md`;
    try { const { sha } = await getFile(path); await delFile(path, sha, `config: 카테고리 ${node.label} 삭제`); }
    catch(e) { /* _index.md 없으면 진행 */ }

    const idx = siblings.findIndex(n => n.key === catKey);
    if (idx >= 0) siblings.splice(idx, 1);
    delete CAT[catKey];
    delete S.catOpen[catKey];
    delete S.catPosts[catKey];
    delete S.counts[catKey];
    CATS.splice(CATS.findIndex(c => c.key === catKey), 1);

    await saveCatsConfig();
    const treeEl = document.getElementById('sidebar-tree');
    if (treeEl) treeEl.innerHTML = renderTree();
    updateMainContent();
    toast(`"${node.label}" 삭제 완료`, 'success');
  } catch(err) { toast('삭제 실패: '+err.message, 'error'); }
}

async function delNode(nodeKey) {
  const found = findNode(S.catTree, nodeKey);
  if (!found) return;
  const { node, siblings } = found;
  // Check no posts in any leaf descendant
  function hasAnyPosts(n) {
    if (!n.children || !n.children.length) return (S.counts[n.key] ?? 0) > 0;
    return n.children.some(hasAnyPosts);
  }
  if (hasAnyPosts(node)) { toast('하위에 글이 있는 카테고리가 있어 삭제할 수 없습니다','error'); return; }
  if (!confirm(`"${node.label}" 폴더를 통째로 삭제할까요?`)) return;

  const idx = siblings.findIndex(n => n.key === nodeKey);
  if (idx >= 0) siblings.splice(idx, 1);
  await saveCatsConfig();
  const treeEl = document.getElementById('sidebar-tree');
  if (treeEl) treeEl.innerHTML = renderTree();
  updateMainContent();
  toast(`"${node.label}" 폴더 삭제 완료`, 'success');
}

async function renameNode(nodeKey, currentLabel) {
  const newLabel = prompt(`"${currentLabel}" 의 새 이름을 입력하세요:`, currentLabel);
  if (!newLabel || newLabel === currentLabel) return;
  const found = findNode(S.catTree, nodeKey);
  if (!found) return;
  found.node.label = newLabel.trim();
  await saveCatsConfig();
  const treeEl = document.getElementById('sidebar-tree');
  if (treeEl) treeEl.innerHTML = renderTree();
  updateMainContent();
  toast('이름을 변경했습니다', 'success');
}

/* ══ Image Upload ══════════════════════════════════════ */
async function uploadImage(file) {
  const ext  = (file.name.split('.').pop() || 'png').toLowerCase();
  const name = `img-${Date.now()}.${ext}`;
  const path = `static/img/uploads/${name}`;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try {
        await saveFile(path, base64, null, `upload: ${name}`, true);
        resolve(`/img/uploads/${name}`);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ══ Front Matter ═════════════════════════════════════ */
function parseMd(raw) {
  const m = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return { fm:{}, body:raw };
  const fm = {};
  for (const line of m[1].split('\n')) {
    const t = line.trim();
    if (!t || t[0]==='#') continue;
    const ci = t.indexOf(':');
    if (ci < 1) continue;
    const k = t.slice(0, ci).trim();
    let v = t.slice(ci + 1).trim();
    if (v==='true')  { fm[k]=true;  continue; }
    if (v==='false') { fm[k]=false; continue; }
    if (/^\d+$/.test(v)) { fm[k]=+v; continue; }
    if (v[0]==='[' && v.endsWith(']')) {
      const inner = v.slice(1,-1).trim();
      fm[k] = inner ? inner.split(',').map(s=>s.trim().replace(/^["']|["']$/g,'')) : [];
      continue;
    }
    fm[k] = v.replace(/^["']|["']$/g,'');
  }
  return { fm, body:m[2].trim() };
}

function buildPostMd(fm, body) {
  const L = ['---'];
  const a = (k, v) => {
    if (v==null||v==='') return;
    if (typeof v==='boolean') { L.push(`${k}: ${v}`); return; }
    if (typeof v==='number')  { L.push(`${k}: ${v}`); return; }
    if (Array.isArray(v)) { L.push(v.length ? `${k}: [${v.map(x=>`"${x}"`).join(', ')}]` : `${k}: []`); return; }
    L.push(`${k}: "${v}"`);
  };
  a('title',      fm.title??'');
  a('date',       fm.date??fmtDate(new Date()));
  a('draft',      fm.draft??true);
  a('categories', fm.categories??[]);
  a('tags',       fm.tags??[]);
  if (fm.description) a('description', fm.description);
  if (fm.image)       a('image',       fm.image);
  if (fm.series?.length) a('series', fm.series);
  if (fm.series_order)   a('series_order', fm.series_order);
  L.push('---', '', body);
  return L.join('\n');
}

function buildAboutMd(title, body) {
  return `---\ntitle: "${title}"\nslug: about\n---\n\n${body}`;
}

/* ══ Utils ════════════════════════════════════════════ */
function fmtDate(d) { return d.toISOString().slice(0, 10); }
function toSlug(s) { return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-'); }
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function $(sel, ctx=document) { return ctx.querySelector(sel); }
function $$(sel, ctx=document) { return [...ctx.querySelectorAll(sel)]; }

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

    </div>

/* ── Tree (Composite 재귀) ────────────────────────────── */
function renderTree() {
  return (S.catTree || []).map(n => renderTreeNode(n, 0)).join('');
}

function renderTreeNode(node, depth) {
  const indent = depth * 10;
  if (node.children && node.children.length > 0) {
    // Group node
    const isOpen = S.catGroupOpen?.[node.key] !== false;
    return `
    <div class="tree-group ${isOpen?'open':''}" id="tgrp-${node.key}" data-group-key="${node.key}">
      <div class="tree-group-hd" data-act="toggle-group" data-group-key="${node.key}" style="padding-left:${12+indent}px">
        <span class="arrow">▶</span>
        ${node.icon||''} ${esc(node.label)}
      </div>
      <div class="tree-group-body">
        ${node.children.map(c => renderTreeNode(c, depth + 1)).join('')}
      </div>
    </div>`;
  } else {
    // Leaf: category with posts
    const isOpen = !!S.catOpen[node.key];
    const posts  = S.catPosts[node.key];
    const count  = S.counts[node.key];
    return `
    <div class="tree-cat ${isOpen?'open':''}" id="tcat-${node.key}">
      <div class="tree-cat-hd" data-act="toggle-cat" data-cat="${node.key}" style="padding-left:${22+indent}px">
        <span class="arrow">▶</span>
        <span class="cat-dot" style="background:${node.color||'#6366f1'}"></span>
        <span class="cat-label">${node.icon||''} ${esc(node.label)}</span>
        <span class="cat-cnt" id="tcnt-${node.key}">${count!=null?count:''}</span>
      </div>
      <div class="tree-cat-body" id="tcatbody-${node.key}">
        ${isOpen ? (posts!==null ? renderPostItems(node.key,posts) : '<div class="tree-loading">로딩 중…</div>') : ''}
      </div>
    </div>`;
  }
}

function renderPostItems(catKey, posts) {
  const isActive = S.edit?.catKey === catKey;
  const items = posts.map(p => `
    <div class="tree-post${p.draft!==false?' draft':''}${isActive&&S.edit?.slug===p.slug?' active':''}"
      data-act="open-post" data-cat="${catKey}" data-slug="${esc(p.slug)}">
      <span class="post-icon-t">${p.draft!==false?'📄':'✅'}</span>
      <span class="post-title-t">${esc(p.title||p.slug)}</span>
    </div>`).join('');
  const empty = !posts.length ? '<div class="tree-empty">글이 없습니다</div>' : '';
  return `${items}${empty}
  <div class="tree-new-btn" data-act="new-post" data-cat="${catKey}">
    <span class="tree-plus">+</span> 새 글 작성
  </div>`;
}

/* ══ EasyMDE ══════════════════════════════════════════ */
function destroyMde() {
  if (S.mde) { try { S.mde.toTextArea(); S.mde.cleanup(); } catch(_){} S.mde=null; }
}

function makeMde(id, minH='360px') {
  if (typeof EasyMDE === 'undefined') return;
  const el = document.getElementById(id);
  if (!el) return;
  S.mde = new EasyMDE({
    element: el,
    spellChecker: false, autofocus: false,
    toolbar: ['bold','italic','heading','|','quote','unordered-list','ordered-list','|','link','|','preview','side-by-side','fullscreen','|','guide'],
    status: false, minHeight: minH,
  });
}

function initEditor() {
  const e = S.edit; if (!e) return;
  if (e.isNew) {
    const titleEl=$('#ed-title'), slugEl=$('#ed-slug'), slVal=$('#slug-val');
    let manual=false;
    if (slugEl) slugEl.addEventListener('input', ()=>{ manual=true; if(slVal) slVal.textContent=slugEl.value; });
    if (titleEl) titleEl.addEventListener('input', ()=>{
      if (!manual) { const s=toSlug(titleEl.value); if(slugEl) slugEl.value=s; if(slVal) slVal.textContent=s; }
    });
  }
  const draftCb=$('#ed-draft'), draftLbl=$('#draft-lbl');
  if (draftCb&&draftLbl) draftCb.addEventListener('change', ()=>{
    draftLbl.textContent = draftCb.checked ? '초안 (비공개)' : '발행됨 (공개)';
  });
  $$('.cat-pill').forEach(p=>p.addEventListener('change', ()=>p.classList.toggle('on', p.querySelector('input').checked)));
  const tagIn=$('#tag-in'), tagsWrap=$('#tags-wrap');
  if (tagIn) tagIn.addEventListener('keydown', ev=>{
    if ((ev.key==='Enter'||ev.key===',')&&tagIn.value.trim()) {
      ev.preventDefault(); addTag(tagIn.value.trim().replace(',','')); tagIn.value='';
    }
    if (ev.key==='Backspace'&&!tagIn.value) { const c=$$('.tag-chip',tagsWrap); if(c.length) c.at(-1).remove(); }
  });
  if (tagsWrap) tagsWrap.addEventListener('click', ev=>{
    const btn=ev.target.closest('[data-rm-tag]'); if(btn) btn.closest('.tag-chip').remove();
  });
  makeMde('ed-body');
}

function initAbout() { makeMde('ab-body', '280px'); }

function addTag(tag) {
  const wrap=$('#tags-wrap'), inp=$('#tag-in');
  if (!tag||!wrap||$$('.tag-chip',wrap).some(c=>c.dataset.tag===tag)) return;
  const chip=document.createElement('span');
  chip.className='tag-chip'; chip.dataset.tag=tag;
  chip.innerHTML=`${esc(tag)}<button class="tag-remove" data-rm-tag="${esc(tag)}">×</button>`;
  chip.querySelector('.tag-remove').addEventListener('click',()=>chip.remove());
  wrap.insertBefore(chip, inp);
}

/* ══ Tree Actions ═════════════════════════════════════ */
function toggleGroup(groupKey) {
  if (!S.catGroupOpen) S.catGroupOpen = {};
  S.catGroupOpen[groupKey] = !S.catGroupOpen[groupKey];
  const el = document.getElementById(`tgrp-${groupKey}`);
  if (el) {
    el.classList.toggle('open', S.catGroupOpen[groupKey]);
    const body = el.querySelector(':scope > .tree-group-body');
    if (body) body.style.display = S.catGroupOpen[groupKey] ? '' : 'none';
  }
}

async function toggleCat(catKey) {
  const wasOpen = !!S.catOpen[catKey];
  S.catOpen[catKey] = !wasOpen;
  const catEl = document.getElementById(`tcat-${catKey}`);
  if (!catEl) return;
  catEl.classList.toggle('open', S.catOpen[catKey]);
  if (!wasOpen && S.catPosts[catKey] === null) {
    await fetchCatPosts(catKey);
  }
}

async function fetchCatPosts(catKey) {
  const bodyEl = document.getElementById(`tcatbody-${catKey}`);
  if (bodyEl) bodyEl.innerHTML = '<div class="tree-loading">로딩 중…</div>';
  try {
    const items = await lsDir(`content/posts/${catKey}`);
    const dirs  = items.filter(i=>i.type==='dir');
    const posts = await Promise.all(dirs.map(async dir => {
      try {
        const { content } = await getFile(`content/posts/${catKey}/${dir.name}/index.md`);
        const { fm } = parseMd(content);
        return { slug:dir.name, title:fm.title||dir.name, date:fm.date, draft:fm.draft };
      } catch { return { slug:dir.name, title:dir.name, date:'', draft:true }; }
    }));
    S.catPosts[catKey] = posts.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    S.counts[catKey] = posts.length;
    if (bodyEl) bodyEl.innerHTML = renderPostItems(catKey, S.catPosts[catKey]);
    const cntEl = document.getElementById(`tcnt-${catKey}`);
    if (cntEl) cntEl.textContent = posts.length || '';
  } catch(err) {
    if (bodyEl) bodyEl.innerHTML = `<div class="tree-empty">오류: ${esc(err.message)}</div>`;
  }
}

async function openEdit(catKey, slug) {

    const { content, sha } = await getFile(path);
    const { fm, body } = parseMd(content);

}

async function savePost(asDraft) {
  const e = S.edit; if (!e) return;
  const title = ($('#ed-title')?.value||'').trim();
  if (!title) { toast('제목을 입력해주세요','error'); return; }
  let slug = e.slug;
  if (e.isNew) {
    slug = ($('#ed-slug')?.value||'').trim() || toSlug(title);
    if (!slug) { toast('슬러그를 입력해주세요','error'); return; }
  }
  const wasNew = e.isNew;
  const fm = {
    title,
    date:        $('#ed-date')?.value||fmtDate(new Date()),
    draft:       asDraft,
    categories:  $$('.cat-pill input:checked').map(i=>i.value),
    tags:        $$('.tag-chip').map(c=>c.dataset.tag),
    description: ($('#ed-desc')?.value||'').trim()||undefined,
    image:       ($('#ed-img')?.value||'').trim()||undefined,
    series:      ($('#ed-series')?.value||'').trim() ? [$('#ed-series').value.trim()] : undefined,
  };
  const body    = S.mde ? S.mde.value() : ($('#ed-body')?.value||'');
  const content = buildPostMd(fm, body);
  const path    = `content/posts/${e.catKey}/${slug}/index.md`;
  const msg     = wasNew ? `post: ${title}` : `update: ${title}`;
  try {
    const res = await saveFile(path, content, e.sha, msg);
    e.sha=res?.content?.sha??null; e.isNew=false; e.slug=slug; e.fm=fm; e.body=body;
    // Update tree
    if (wasNew) {
      S.counts[e.catKey] = (S.counts[e.catKey]||0) + 1;
      S.catPosts[e.catKey] = null; // invalidate - reload on next expand
      S.catOpen[e.catKey] = false;
      const catEl = document.getElementById(`tcat-${e.catKey}`);
      if (catEl) catEl.classList.remove('open');
      const cntEl = document.getElementById(`tcnt-${e.catKey}`);
      if (cntEl) cntEl.textContent = S.counts[e.catKey] || '';
    } else {
      const postEl = document.querySelector(`[data-act="open-post"][data-slug="${CSS.escape(slug)}"][data-cat="${e.catKey}"]`);
      if (postEl) { const t=postEl.querySelector('.post-title-t'); if(t) t.textContent=title; }
    }
    updateMainContent();
    toast(asDraft?'초안으로 저장했습니다':'발행했습니다 🎉','success');
  } catch(err) { toast('저장 실패: '+err.message,'error'); }
}

async function delPost() {
  const e = S.edit; if (!e||e.isNew) return;
  if (!confirm(`"${e.fm.title||e.slug}" 글을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  const path = `content/posts/${e.catKey}/${e.slug}/index.md`;
  try {
    let sha = e.sha;
    if (!sha) { const f=await getFile(path); sha=f.sha; }
    await delFile(path, sha, `delete: ${e.fm.title||e.slug}`);
    S.counts[e.catKey] = Math.max(0,(S.counts[e.catKey]||1)-1);
    S.catPosts[e.catKey] = null;
    S.catOpen[e.catKey] = false;
    const catEl = document.getElementById(`tcat-${e.catKey}`);
    if (catEl) catEl.classList.remove('open');
    const cntEl = document.getElementById(`tcnt-${e.catKey}`);
    if (cntEl) cntEl.textContent = S.counts[e.catKey] || '';
    S.edit=null; S.view='welcome'; updateMainContent();
    toast('삭제했습니다','success');
  } catch(err) { toast('삭제 실패: '+err.message,'error'); }
}

/* ══ Events ═══════════════════════════════════════════ */
document.addEventListener('click', ev => {
  if (ev.target.closest('#login-btn')) { doLogin(); return; }
  const el = ev.target.closest('[data-act]');
  if (!el) return;
  const d = el.dataset;
  switch (d.act) {
    // Navigation
    case 'toggle-group':  toggleGroup(d.groupKey); break;
    case 'toggle-cat':    toggleCat(d.cat); break;
    case 'open-post':     openEdit(d.cat, d.slug); break;
    case 'new-post':      openNew(d.cat); break;
    case 'welcome':       S.view='welcome'; S.edit=null; updateMainContent(); break;
    // Post editor
    case 'save-draft':    savePost(true);  break;
    case 'publish':       savePost(false); break;
    case 'del-post':      delPost(); break;
    // About
    case 'about':         loadAbout(); break;
    case 'save-about':    saveAbout(); break;
    // Categories (Composite)
    case 'cats-manage':   S.view='cats'; S.edit=null; updateMainContent(); break;
    case 'show-add-cat':  S.showAddCat=true; S.addCatParent=d.parentKey||null; updateMainContent(); break;
    case 'hide-add-cat':  S.showAddCat=false; updateMainContent(); break;
    case 'save-add-cat':  addCat(); break;
    case 'del-cat':       delCat(d.cat); break;
    case 'del-node':      delNode(d.nodeKey); break;
    case 'rename-node':   renameNode(d.nodeKey, d.nodeLabel); break;
    // Profile
    case 'profile':       S.view='profile'; S.edit=null; updateMainContent(); break;
    case 'save-profile':  saveProfile(); break;
    case 'add-link': {
      const wrap = document.getElementById('pf-links');
      if (!wrap) break;
      const row = document.createElement('div');
      row.className = 'pf-link-row';
      row.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;align-items:center';
      row.innerHTML = `
        <input class="pf-link-label form-input" placeholder="GitHub" style="width:100px;flex-shrink:0" />
        <input class="pf-link-url form-input" placeholder="https://..." style="flex:1" />
        <input class="pf-link-icon form-input" placeholder="github" style="width:80px;flex-shrink:0" />
        <button class="btn btn-sm btn-danger" data-act="del-link">×</button>`;
      wrap.appendChild(row);
      break;
    }
    case 'del-link':
      el.closest('.pf-link-row')?.remove();
      break;
    // Auth
    case 'logout':        logout(); break;
  }
});

// Image drag-and-drop into editor
document.addEventListener('dragover', ev => {
  if (S.view !== 'editor') return;
  ev.preventDefault();
});
document.addEventListener('drop', async ev => {
  if (S.view !== 'editor') return;
  const files = [...(ev.dataTransfer?.files || [])].filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  ev.preventDefault();
  toast('이미지 업로드 중…', 'info');
  try {
    const urls = await Promise.all(files.map(uploadImage));
    const insert = urls.map(u => `![](${u})`).join('\n');
    if (S.mde) S.mde.value(S.mde.value() + '\n' + insert);
    else { const ta = document.getElementById('ed-body'); if (ta) ta.value += '\n' + insert; }
    toast(`이미지 ${urls.length}개 업로드 완료`, 'success');
  } catch(err) { toast('업로드 실패: '+err.message, 'error'); }
});

document.addEventListener('keydown', ev => {
  if (!S.pat && ev.key==='Enter' && document.activeElement?.id==='pat-in') doLogin();
});

/* ══ Init ══════════════════════════════════════════════ */
render();
if (S.pat) { loadCounts(); loadCatsConfig(); loadProfile(); }
</script>
