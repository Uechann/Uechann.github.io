backend:
  name: github
  repo: Uechann/Uechann.github.io
  branch: main

# 로컬 개발 시 아래 줄을 주석 해제하고, 별도 터미널에서
# `npx @sveltia/cms-backend` 를 실행하면 로컬 파일시스템에 직접 쓸 수 있습니다.
# local_backend: true

media_folder: "static/uploads"
public_folder: "/uploads"

# 카테고리 선택 옵션 (select 위젯에서 공통 사용)
# 새 카테고리 추가 시 각 컬렉션의 options 목록에 추가하세요.

collections:

  # ════════════════════════════════════════════════════════════════
  # 개념학습
  # ════════════════════════════════════════════════════════════════

  - name: "java"
    label: "Java"
    label_singular: "Java 글"
    folder: "content/posts/java"
    create: true
    path: "{{slug}}/index"
    preview_path: "posts/java/{{slug}}"
    fields:
      - { label: "제목 *",       name: "title",       widget: "string" }
      - { label: "작성일",       name: "date",        widget: "datetime",
          date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "초안 (true = 비공개)",  name: "draft", widget: "boolean", default: true }
      - { label: "카테고리",     name: "categories",  widget: "select", multiple: true,
          options: ["Java","Spring","Database","Network","Infra","우테코-미션","우테코-스터디","우테코-활동","트러블슈팅","회고"],
          default: ["Java"] }
      - { label: "태그",         name: "tags",        widget: "list", required: false }
      - { label: "요약 (카드 한 줄 소개)", name: "description", widget: "text", required: false }
      - { label: "커버 이미지 (1200×630px 권장)", name: "image", widget: "image", required: false }
      - { label: "시리즈명",     name: "series",      widget: "list", required: false }
      - { label: "시리즈 순서",  name: "series_order", widget: "number", required: false, value_type: "int" }
      - { label: "본문",         name: "body",        widget: "markdown" }

  - name: "spring"
    label: "Spring"
