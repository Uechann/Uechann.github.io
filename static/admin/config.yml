backend:
  name: github
  repo: Uechann/Uechann.github.io
  branch: main

# 로컬 개발 시 아래 줄을 주석 해제하고, 별도 터미널에서
# `npx @sveltia/cms-backend` 를 실행하면 로컬 파일시스템에 직접 쓸 수 있습니다.
# 배포 전에는 반드시 다시 주석 처리하세요.
# local_backend: true

# CMS에서 업로드한 이미지 저장 위치
# static/ 하위 파일은 Hugo가 그대로 public/으로 복사해 /uploads/... 로 서빙합니다.
media_folder: "static/uploads"
public_folder: "/uploads"

collections:

  # ── Java ─────────────────────────────────────────────────────────
  - name: "java"
    label: "Java"
    label_singular: "Java 글"
    folder: "content/posts/java"
    create: true
    path: "{{slug}}/index"
    preview_path: "posts/java/{{slug}}"
    fields:
      - { label: "제목",       name: "title",       widget: "string" }
      - { label: "작성일",     name: "date",        widget: "datetime",
          date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "초안",       name: "draft",       widget: "boolean", default: true }
      - { label: "카테고리",   name: "categories",  widget: "list",
          default: ["Java"], required: false }
      - { label: "태그",       name: "tags",        widget: "list", required: false }
      - { label: "요약",       name: "description", widget: "string", required: false }
      - { label: "커버 이미지", name: "image",       widget: "image", required: false }
      - { label: "본문",       name: "body",        widget: "markdown" }

